<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Base path for ComfyUI integration -->
    <base href="/gjj/mesh2motion/" />
    <title style="display: none">Mesh2Motion - 创建</title>
    <link rel="icon" type="image/png" href="images/favicon.png"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" crossorigin src="/gjj/mesh2motion/assets/windowCreate-DZq3isMd.js"></script>
  <link rel="modulepreload" crossorigin href="/gjj/mesh2motion/assets/dialog-DLSP7MTB.js">
  <link rel="modulepreload" crossorigin href="/gjj/mesh2motion/assets/export-overlay-ABM4UpqP.js">
  <link rel="stylesheet" crossorigin href="/gjj/mesh2motion/assets/dialog-C4NDzct4.css">
  <link rel="stylesheet" crossorigin href="/gjj/mesh2motion/assets/export-overlay-BsAGLCSz.css">
  <script type="module" src="/gjj/mesh2motion/assets/gjj-localize-cn.js"></script>
</head>
<body style="margin: 0">
    <!--
      Window mode entry point for the Create flow. Loaded by the ComfyUI
      plugin's Dialog when the user right-clicks a 3D-model node. Always
      requested with ?window=true so WindowBridge activates (and the
      node-mode ComfyUIIntegration stays dormant).
    -->

    <nav>
        <div style="display: inline-flex; align-items: center;">
            <a href="https://mesh2motion.org"><img src="images/mesh2motion.svg" width="200" /></a>
            <a href="index-comfyui-window.html?window=true">浏览</a>
            <span class="active-nav-item">创建</span>
        </div>

        <div style="display: inline-flex; align-items: center;">
            <a href="https://support.mesh2motion.org" target="_blank"> 💗 支持</a>
            <a href="https://github.com/scottpetrovic/mesh2motion-app" target="_blank">源码</a>
            <a href="#" id="attribution-link">贡献者</a>

            <!-- Theme Toggle -->
            <button id="theme-toggle">
                <span class="theme-icon"></span>
            </button>
        </div>
    </nav>

    <div id="header-ui">
        <div>
            <img src="images/mouse-left.svg" height="30" width="30" style="vertical-align: middle;"/> Rotate
        </div>
        <div>
            <img src="images/mouse-right.svg" height="30" width="30" style="vertical-align: middle;"/> Pan
        </div>
        <div>
            <img src="images/mouse-middle.svg" height="30" width="30" style="vertical-align: middle;"/> Zoom
        </div>
    </div>

    <div id="theme-toggle-container">
        <button id="theme-toggle">
            <span class="theme-icon"></span>
        </button>
    </div>

    <div id="tool-panel">
        <div id="tool-selection-group">
            <div style="margin-bottom: 1rem; padding: 0;">
                <span id="current-step-index"></span>
                <span id="current-step-label"></span>
            </div>

            <div id="load-model-tools">
                <label for="model-upload" class="button" data-tippy-content="推荐使用 GLB 或 FBX；GLTF+BIN+贴图请打包为 ZIP，DAE+贴图也支持 ZIP。">
                    <span class="button-icon-group">
                        <span class="material-symbols-outlined">upload</span>
                        <span>上传</span>
                        <span class="material-symbols-outlined">help</span>
                    </span>
                </label>
                <input id="model-upload" type="file" name="file-upload" accept=".glb, .zip, .fbx" />

                <div style="text-align: center; font-size: 1.5rem">或</div>

                <div class="alternate-background-section">
                    <p style="margin: 0">参考模型</p>
                    <select id="model-selection">
                        <option value="models/model-human.glb">人形</option>
                        <option value="models/model-fox.glb">狐狸</option>
                        <option value="models/model-bird.glb">鸟类</option>
                        <option value="models/model-dragon.glb">龙</option>
                    </select>
                    <button id="load-model-button">加载</button>
                </div>

                <div class="styled-checkbox">
                    <input type="checkbox" id="load-model-debug-checkbox" name="load-model-debug-checkbox">
                    <label for="load-model-debug-checkbox">调试</label>
                    <span class="material-symbols-outlined" data-tippy-content="用法线着色器替换所有材质，便于调试。">help</span>
                </div>
            </div>

            <div id="load-skeleton-tools">
                <span>
                    <span style="max-width: 220px">将模型旋转到正面 <br/> （蓝色原点线）</span>
                    <div style="display: flex; flex-direction: row">
                        <button class="secondary-button" id="rotate-model-x-button">X</button>
                        <button class="secondary-button" id="rotate-model-y-button">Y</button>
                        <button class="secondary-button" id="rotate-model-z-button">Z</button>
                    </div>
                </span>

                <hr />

                <span style="max-width: 220px">
                    <span>如果模型低于地面</span>
                    <div style="display: flex; flex-direction: row">
                        <button class="secondary-button" id="move-model-to-floor-button">移动</button>
                    </div>
                </span>

                <hr />

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <span>骨骼模板</span>
                    <select id="skeleton-selection">
                        <option value="select-skeleton">选择骨骼</option>
                        <option value="human">人形</option>
                        <option value="quadraped">四足生物</option>
                        <option value="bird">鸟类</option>
                        <option value="dragon">龙</option>
                    </select>
                </div>

                <div id="hand-skeleton-options" class="alternate-background-section">
                    <span style="display: flex; gap: 1rem;">
                        <span>手部选项</span>
                        <span class="material-symbols-outlined" data-tippy-content="选择保留哪些手指骨骼。单一手骨会移除全部手指，只保留手部骨骼。">help</span>
                    </span>

                    <select id="hand-skeleton-selection">
                        <option value="all-fingers">全部手指</option>
                        <option value="thumb-and-index">拇指 + 主手指</option>
                        <option value="simplified-hand">全部手指（简化）</option>
                        <option value="single-bone">单一手骨</option>
                    </select>
                </div>

                <div id="scale-skeleton-controls" style="display: none; flex-direction: column;">
                    <div style="display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 1rem;">
                        <label style="display:inline-flex">缩放骨骼</label>
                        <span class="material-symbols-outlined" data-tippy-content="调整骨骼整体缩放。">help</span>
                        <button class="secondary-button" id="reset-skeleton-scale-button">
                            <img src="images/icons/reset.svg" alt="重置骨骼缩放" width="20" height="20" />
                        </button>
                    </div>
                    <div style="display: flex; flex-direction: row; gap: 1rem; justify-content: flex-start; align-items: center;">
                        <span id="scale-skeleton-percentage-display">100%</span>
                        <input id="scale-skeleton-input" style="flex-grow: 1;" type="range" min=".10" max="2.00" value="1.0" step="0.01" />
                    </div>
                </div>

                <div style="display: flex; gap: 0.5rem;">
                    <button class="secondary-button" id="action_back_to_load_model">&#x2039; 返回</button>
                    <button id="load-skeleton-button">编辑骨骼 &nbsp;&#x203a;</button>
                </div>
            </div>

            <span id="skeleton-step-actions">
                <fieldset style="position: fixed; right: 272px; top: 52px;">
                    <div style="display: flex; gap: 2px;">
                        <button id="undo-button" class="secondary-button" title="撤销 (Ctrl+Z)" disabled>
                            <img src="images/icons/undo.png" alt="撤销" width="16" height="16" />
                        </button>
                        <button id="redo-button" class="secondary-button" title="重做 (Ctrl+Y)" disabled>
                            <img src="images/icons/redo.png" alt="重做" width="16" height="16" />
                        </button>
                    </div>
                </fieldset>

                <p id="bone-selection-section">
                    <span>选中骨骼： <span id="edit-selected-bone-label">无</span></span>
                </p>

                <div style="display: flex; flex-direction: row;">
                    <fieldset>
                        <span>预览</span>
                        <div id="mesh-preview-group" class="toggle">
                            <input id="preview-painted" type="radio" name="mesh-preview-type" value="weight-painted" checked="checked" />
                            <label for="preview-painted">
                                <img src="images/icons/display-weight-painted.svg" alt="权重" width="20" height="20" title="权重涂色网格" />
                            </label>
                            <input id="preview-textured" type="radio" name="mesh-preview-type" value="textured" />
                            <label for="preview-textured">
                                <img src="images/icons/display-textured.svg" alt="贴图" width="20" height="20" title="贴图网格" />
                            </label>
                        </div>
                    </fieldset>

                    <fieldset>
                        <span>变换</span>
                        <div id="transform-control-type-group" class="toggle">
                            <input type="radio" name="transform-control-type" value="translate" id="transform-translate" checked="checked" />
                            <label for="transform-translate">
                                <img src="images/icons/tool-move.svg" alt="平移" width="20" height="20" title="平移" />
                            </label>
                            <input type="radio" name="transform-control-type" value="rotation" id="transform-rotate" />
                            <label for="transform-rotate">
                                <img src="images/icons/tool-rotate.svg" alt="旋转" width="20" height="20" title="旋转" />
                            </label>
                        </div>
                    </fieldset>

                    <fieldset>
                        <span>坐标空间</span>
                        <div id="transform-space-group" class="toggle">
                            <input type="radio" name="transform-space" value="global" id="transform-global" checked="checked" />
                            <label for="transform-global">
                                <img src="images/icons/tool-global.svg" alt="全局" width="20" height="20" title="全局" />
                            </label>
                            <input type="radio" name="transform-space" value="local" id="transform-local" />
                            <label for="transform-local">
                                <img src="images/icons/tool-local.svg" alt="局部" width="20" height="20" title="局部" />
                            </label>
                        </div>
                    </fieldset>
                </div>

                <div class="styled-checkbox">
                    <input type="checkbox" id="mirror-skeleton" name="mirror-skeleton" value="mirror" checked>
                    <label for="mirror-skeleton">镜像左右关节</label>
                </div>

                <hr />

                <div id="use-head-weight-correction-container" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                    <div class="styled-checkbox">
                        <input type="checkbox" id="preview-plane-checkbox" />
                        <label for="preview-plane-checkbox">使用头部权重修正</label>
                        <span class="material-symbols-outlined" data-tippy-content="如果手臂影响头部权重（例如 Q 版角色），可用分隔平面辅助限定头部区域。">help</span>
                    </div>

                    <div id="preview-plane-setting-container" style="display: flex; align-items: center; gap: 0.5rem;">
                        <label for="preview-plane-height-input">高度：</label>
                        <input type="range" id="preview-plane-height-input" min="0.20" max="2.00" step="0.01" value="0.50" />
                        <span id="preview-plane-height-label" style="width: 2rem;">0.50</span>
                    </div>

                    <hr />
                </div>

                <label style="display: none" for="skinning-algorithm-options">蒙皮算法：</label>
                <select style="display: none" id="skinning-algorithm-options">
                    <option value="closest-distance-targeting">最近距离目标</option>
                    <option value="closest-bone">最近骨骼</option>
                    <option value="closest-bone-child">最近距离子骨骼</option>
                </select>

                <div class="display: flex; gap: 0.5rem;">
                    <button class="secondary-button" id="action_back_to_load_skeleton">&#x2039; 返回</button>
                    <button id="action_bind_pose">绑定姿势</button>
                </div>
            </span>

            <span id="skinned-step-animation-export-options">
                <div id="animations-listing">
                    <div id="animation-listing-count">0</div>
                    <input type="text" id="animation-filter" placeholder="筛选动画...">

                    <div id="animation-progress-loader-container" style="display: none">
                        <div id="loading-status-text">正在加载动画数据</div>
                        <div id="loading-progress-bar"></div>
                        <div id="current-file-progress-bar"></div>
                    </div>

                    <div id="animations-items"></div>

                    <div id="a-pose-correction-options">
                        <div style="display: flex; flex-direction: row; align-items: center; gap: 1rem; justify-content: center;">
                            <label style="display:inline-flex">A-Pose 修正 - 展开手臂</label>
                            <span class="material-symbols-outlined" data-tippy-content="如果模型是 A-Pose，可用它为所有动画展开或收拢手臂。">help</span>
                            <button class="secondary-button" id="reset-a-pose-button">
                                <img src="images/icons/reset.svg" alt="重置 A-Pose" width="20" height="20" />
                            </button>
                        </div>

                        <div style="display: flex; flex-direction: row; gap: 1rem; justify-content: flex-start; align-items: center;">
                            <input type="number" id="extend-arm-numeric-input" name="arm-extend-input" value="0" min="-70" max="100" step="1">
                            <span class="suffix-unit">%</span>
                            <input id="extend-arm-range-input" style="flex-grow: 1;" type="range" min="-70" max="100" value="0" />
                        </div>

                        <hr />
                    </div>

                    <div style="display: flex; gap: 0.5rem;">
                        <button class="secondary-button" id="action_back_to_edit_skeleton">&#x2039; 返回</button>

                        <div class="styled-checkbox icon-toggle">
                            <input type="checkbox" id="mirror-animations-checkbox" name="mirror-animations" value="true" style="display:none;">
                            <label for="mirror-animations-checkbox" data-tippy-content="镜像动画" tabindex="0">
                                <img src="images/icons/mirror.svg" alt="镜像动画" width="30" height="30" />
                            </label>
                        </div>

                        <div class="styled-checkbox icon-toggle">
                            <input type="checkbox" id="show-skeleton-checkbox" name="show-skeleton" value="show" style="display:none;">
                            <label for="show-skeleton-checkbox" data-tippy-content="显示骨骼" tabindex="0">
                                <img src="images/icons/bone-display.svg" width="30" height="30" alt="显示骨骼" />
                            </label>
                        </div>

                        <button id="export-button" title="导出动画。请先选择要导出的动画。">
                            <span class="button-icon-group">
                                <span class="material-symbols-outlined">save_alt</span>
                                <span>下载 <span id="animation-selection-count">0</span></span>
                            </span>
                        </button>
                        <a id="download-hidden-link" href="#" style="display:none"></a>
                    </div>
                </div>
            </span>
        </div>
    </div>

    <div id="animation-player">
        <div id="current-animation-container">
            <span id="current-animation-name">未选择动画</span>
        </div>
        <div id="play-controls">
            <button id="play-pause-button" class="animation-control-button" disabled>
                <span class="material-symbols-outlined">play_arrow</span>
            </button>
            <span>
                <span id="current-time">0f</span> /
                <span id="total-time">0f</span>
            </span>
            <input type="range" id="animation-scrubber" min="0" max="100" value="0" disabled>
        </div>
    </div>

    <div id="view-control-hitbox"></div>

    <span id="build-version"></span>
</body>
</html>

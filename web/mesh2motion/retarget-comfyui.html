<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- Base path for ComfyUI integration -->
    <base href="/gjj/mesh2motion/" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh2Motion - 重定向</title>
    <link rel="icon" type="image/png" href="images/favicon.png"/>

    <!-- Stylesheets-->
  <script type="module" crossorigin src="/gjj/mesh2motion/assets/retarget-BnvlYTq4.js"></script>
  <link rel="modulepreload" crossorigin href="/gjj/mesh2motion/assets/dialog-DLSP7MTB.js">
  <link rel="stylesheet" crossorigin href="/gjj/mesh2motion/assets/dialog-C4NDzct4.css">
  <link rel="stylesheet" crossorigin href="/gjj/mesh2motion/assets/retarget-OBL9cUKi.css">
  <script type="module" src="/gjj/mesh2motion/assets/gjj-localize-cn.js"></script>
</head>

<body style="margin: 0">

    <nav>
        <div style="display: inline-flex; align-items: center;">
            <a href="https://mesh2motion.org"><img src="images/mesh2motion.svg" width="200" /></a>
            <a href="index-comfyui.html">浏览</a>
            <span class="active-nav-item">重定向</span>
        </div>

        <div style="display: inline-flex; align-items: center;">
            <a href="https://support.mesh2motion.org" target="_blank"> 支持</a>
            <a href="https://github.com/scottpetrovic/mesh2motion-app" target="_blank">源码</a>
            <a href="#" id="attribution-link">贡献者</a>

            <!-- Theme Toggle -->
            <button id="theme-toggle">
                <!-- icon will fill in here-->
                <span class="theme-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Tool Options Panel -->
    <div id="tool-panel">

        <!-- bone mapping step to hook up source and target rig -->
        <span id="bone-mapping-step">
            <h1>导入你自己的绑定模型</h1>

            <p>上传带骨骼的模型，并把 Mesh2Motion 动画重定向到目标骨架。</p>
            <div style="display: flex; flex-direction: row; gap: 1rem; margin-top: 1rem;">
                <!-- Mesh2Motion skeleton (source) - draggable bones -->
                <div class="bone-map-section">
                    <h2 class="bone-map-heading">Mesh2Motion 骨架（源）</h2>
                    <div class="bone-map-content">
                        <div id="skeleton-selection-container" >
                            <select id="skeleton-type-select" class="button">
                                <option value="human" selected>人形</option>
                                <option value="quadraped">四足（狐狸）</option>
                                <option value="bird">鸟类</option>
                                <option value="dragon">龙</option>
                            </select>
                        </div>

                        <p>骨骼列表 <span id="source-bone-count">(0)</span></p>
                        <div id="source-bones-list">
                            <p style="color: var(--text-secondary);">未加载源骨架</p>
                        </div>
                    </div>

                </div>

                <div style="align-self: center; font-size: 2rem; color: var(--text-secondary);">

                </div>

                <!-- imported 3d skinned mesh (target) - drop zone for bones -->
                <div class="bone-map-section">
                    <p class="bone-map-heading">你的 3D 绑定模型（目标）</p>
                    <div class="bone-map-content">
                        <div style="display: flex; gap: 0.5rem;">
                            <!-- there are some issues going on with scaling the skeleton for FBX and other formats so we will start simple for now with just GLB files -->
                            <input type="file" id="upload-file" accept=".glb, .fbx, .zip" style="display: none;" />
                            <label for="upload-file" class="button" id="load-model-button">上传骨架模型</label>

                            <button id="auto-map-button" class="secondary-button" style="display: none;">自动映射骨骼</button>
                            <button id="clear-mappings-button" class="secondary-button" style="display: none;">清空映射</button>
                        </div>

                        <p>骨骼列表  <span id="target-bone-count">(0)</span></p>
                        <div id="target-bones-list">
                            <p style="color: var(--text-secondary);">未加载目标骨架</p>
                        </div>
                    </div>

                </div>
            </div>

            <div style="display: flex; padding: 1rem; justify-content: flex-end;">
                <button id="continue-to-listing-button" style="display: none">继续</button>
            </div>
        </span>

        <!-- animation listings area -->
        <span id="skinned-step-animation-export-options">

            <div id="animations-listing">

                <!-- Filter textbox for animations -->
                <div id="animation-listing-count">0</div>
                <input type="text" id="animation-filter" placeholder="筛选动画...">

                <!-- loading progress when animations start getting larger. -->
                <div id="animation-progress-loader-container" style="display: none">
                    <div id="loading-status-text">正在加载动画数据</div>
                    <div id="loading-progress-bar"></div>
                    <div id="current-file-progress-bar"></div>
                </div>


                <!-- javascript will populate this item with animations
                     that we get from the animations file(s)  -->
                <div id="animations-items"> </div>



                <div style="display: flex; gap: 0.5rem;">
                    <button class="secondary-button" id="back_to_bone_map_button" >&#x2039; 返回</button>


                    <!-- checkbox option to show skeleton -->
                    <div class="styled-checkbox icon-toggle">
                        <input type="checkbox" id="show-skeleton-checkbox" name="show-skeleton" value="show" style="display:none;">
                        <label for="show-skeleton-checkbox" data-tippy-content="显示骨骼"  tabindex="0">
                            <img src="images/icons/bone-display.svg" width="30" height="30" alt="显示骨骼" />
                        </label>
                    </div>

                    <!-- I renamed the button ID since we need to process the aniamtions different
                         -->
                    <button id="export-retargeting-button" title="导出动画。请先选择要导出的动画。">
                        <span class="button-icon-group">
                            <span class="material-symbols-outlined">save_alt</span>
                            <span>下载 <span id="animation-selection-count">0</span></span>
                        </span>
                    </button>
                    <a id="download-hidden-link" href="#" style="display:none"></a>

                </div>



            </div>


        </span>

    </div>

    <!-- Free-floating Animation Player -->
    <div id="animation-player">
        <div id="current-animation-container">
            <span id="current-animation-name">未选择动画</span>
        </div>
        <div id="play-controls">
            <button id="play-pause-button" class="animation-control-button" disabled>
                <span class="material-symbols-outlined">play_arrow</span>
            </button>
            <span>
                <span id="current-time">0f</span> /
                <span id="total-time">0f</span>
            </span>
            <input type="range" id="animation-scrubber" min="0" max="100" value="0" disabled>
        </div>

    </div>

    <!-- 3d view controls shown on bottom right. This helps with click events -->
    <div id="view-control-hitbox"></div>

</body>
</html>
